<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connection Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #58a6ff;
    --friend:   #3d8bcd;
    --family:   #d4a843;
    --none-col: #444c56;
    --glow-f:   rgba(61,139,205,0.25);
    --glow-fam: rgba(212,168,67,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  header h1 span {
    color: var(--family);
    font-style: italic;
  }

  .legend {
    display: flex;
    gap: 18px;
    margin-left: auto;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.7rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .legend-item:hover { border-color: var(--border); background: rgba(255,255,255,0.04); }
  .legend-item.active { color: var(--text); border-color: var(--border); }

  .legend-line {
    width: 28px;
    height: 2px;
    border-radius: 1px;
  }

  .legend-line.friend  { background: var(--friend); }
  .legend-line.family  { background: var(--family); }
  .legend-line.none    { background: var(--none-col); opacity: 0.4; }

  .stats {
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    gap: 14px;
  }

  .stats span b { color: var(--accent); }

  #graph-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  svg:active { cursor: grabbing; }

  /* ── Edges ── */
  .edge-friend {
    stroke: var(--friend);
    stroke-width: 1.5;
    stroke-dasharray: 5 3;
    fill: none;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .edge-family {
    stroke: var(--family);
    stroke-width: 1.8;
    fill: none;
    opacity: 0.75;
    transition: opacity 0.2s;
  }

  .edge-friend.faded, .edge-family.faded { opacity: 0.08; }

  /* ── Family bridge paths ── */
  .edge-bridge {
    stroke: #e05252;
    stroke-width: 3;
    stroke-dasharray: 12 6;
    fill: none;
    opacity: 0.7;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .edge-bridge.hidden { display: none; }

  .legend-line.bridge {
    background: #e05252;
    height: 3px;
    border-radius: 1px;
    border-top: none;
  }

  /* ── Nodes ── */
  .node circle {
    stroke-width: 1.5;
    cursor: pointer;
    transition: r 0.15s;
  }

  .node circle.type-person {
    fill: #1c2333;
    stroke: var(--accent);
  }

  .node circle.connected-family {
    stroke: var(--family);
  }

  .node circle.connected-both {
    stroke: url(#bothGrad);
  }

  .node circle.highlighted {
    fill: rgba(88, 166, 255, 0.15);
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .node text.node-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: var(--muted);
    text-anchor: middle;
    pointer-events: none;
    dominant-baseline: central;
    transition: fill 0.15s;
  }

  .node:hover text.node-label,
  .node.hovered text.node-label { fill: var(--text); }

  .node.faded circle { opacity: 0.12; }
  .node.faded text   { opacity: 0.08; }

  /* ── Sibling group bars ── */
  .sibling-group { cursor: grab; }
  .sibling-group:active { cursor: grabbing; }

  .sibling-bar-line {
    stroke: #3a4150;
    stroke-width: 2;
    fill: none;
  }

  .sibling-tick {
    stroke: #3a4150;
    stroke-width: 1;
    stroke-dasharray: 2 3;
    fill: none;
  }

  .sib-member { cursor: pointer; }

  /* ── Relationship labels ── */
  .rel-label-bg {
    fill: #1a1f2b;
    stroke: var(--family);
    stroke-width: 0.5;
    rx: 3; ry: 3;
    opacity: 0.9;
  }

  .rel-label-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    fill: var(--family);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
    opacity: 0.9;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 15px;
    font-size: 0.7rem;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    z-index: 100;
    cursor: default;
  }

  #tooltip.visible { opacity: 1; }

  #tooltip .tt-close {
    position: absolute;
    top: 7px; right: 9px;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
  }
  #tooltip .tt-close:hover { color: var(--text); background: var(--border); }

  #tooltip .tt-name {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 6px;
  }

  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  #tooltip .tt-row span:last-child { color: var(--text); }

  #tooltip .tt-connections {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    max-height: 120px;
    overflow-y: auto;
  }

  #tooltip .tt-conn-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 0.65rem;
  }

  .dot-f   { width: 6px; height: 6px; border-radius: 50%; background: var(--friend); flex-shrink:0; }
  .dot-fam { width: 6px; height: 6px; border-radius: 50%; background: var(--family); flex-shrink:0; }

  #tooltip .tt-conn-item span { color: var(--muted); }
  #tooltip .tt-conn-item b { color: var(--text); font-weight: 400; }

  /* ── Controls ── */
  .controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .ctrl-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }

  .ctrl-btn:hover { background: var(--border); }

  /* ── Search ── */
  .search-wrap {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: none;
  }

  #search-input {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 20px;
    width: 220px;
    outline: none;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>Connection <span>Network</span></h1>
  <div class="stats" id="stats"></div>
  <div class="legend">
    <div class="legend-item active" id="tog-friend" onclick="toggleType('friend')">
      <div class="legend-line friend"></div><span>Friend</span>
    </div>
    <div class="legend-item active" id="tog-family" onclick="toggleType('family')">
      <div class="legend-line family"></div><span>Family</span>
    </div>
    <div class="legend-item active" id="tog-bridge" onclick="toggleBridge()">
      <div class="legend-line bridge" style="width:28px;height:3px;background:#e05252;border-radius:1px;"></div><span>Family Bridges</span>
    </div>
    <div class="legend-item" id="tog-search" onclick="toggleSearch()" title="Search (/)">
      <span>⌕ Search</span>
    </div>
  </div>
</header>

<div id="graph-wrap">
  <svg id="svg"></svg>
  <div id="tooltip"></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="zoom(1.3)" title="Zoom in">+</button>
    <button class="ctrl-btn" onclick="zoom(0.77)" title="Zoom out">−</button>
    <button class="ctrl-btn" onclick="resetView()" title="Reset view">⌂</button>
  </div>
  <div class="search-wrap" id="search-wrap">
    <input id="search-input" placeholder="Search person…" oninput="doSearch(this.value)" onkeydown="if(e=>e.key==='Escape')toggleSearch()"/>
  </div>
</div>

// ── Parse matrix ────────────────────────────────────────────────────────────
function parseMatrix(csv) {
  const lines = csv.trim().split('\n');
  // Parse header row → column names
  const header = lines[0].split(',');
  const colNames = header.slice(1); // skip leading empty cell

  const nodeSet = new Map(); // canonical name → node object
  const edgeMap = new Map(); // "nameA|||nameB" → strongest relationship

  function canonical(name) {
    return name.trim();
  }

  // Collect all unique names (merge duplicates by name)
  colNames.forEach(n => {
    const c = canonical(n);
    if (c && !nodeSet.has(c)) nodeSet.set(c, { name: c, friendCount: 0, familyCount: 0 });
  });
  for (let i = 1; i < lines.length; i++) {
    const rowName = canonical(lines[i].split(',')[0]);
    if (rowName && !nodeSet.has(rowName)) nodeSet.set(rowName, { name: rowName, friendCount: 0, familyCount: 0 });
  }

  // Build edges — deduplicate using canonical sorted pair key
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',');
    const rowName = canonical(cells[0]);
    if (!rowName) continue;

    for (let j = 1; j < cells.length; j++) {
      const val = cells[j].trim();
      if (!val) continue;

      const colName = canonical(colNames[j - 1]);
      if (!colName || colName === rowName) continue;

      // Canonical key: alphabetically sorted pair
      const pair = [rowName, colName].sort();
      const key = pair[0] + '|||' + pair[1];

      if (!edgeMap.has(key)) {
        edgeMap.set(key, { source: pair[0], target: pair[1], rel: val, type: val === 'x' ? 'friend' : 'family' });
      } else {
        // Prefer family over friend
        const existing = edgeMap.get(key);
        if (val !== 'x' && existing.type === 'friend') {
          edgeMap.set(key, { source: pair[0], target: pair[1], rel: val, type: 'family' });
        }
        // If both are family phrases, combine if different
        if (val !== 'x' && existing.type === 'family' && existing.rel !== val) {
          edgeMap.set(key, { ...existing, rel: existing.rel + ' / ' + val });
        }
      }
    }
  }

  const nodes = Array.from(nodeSet.values());
  const edges = Array.from(edgeMap.values());

  // Count connections per node
  edges.forEach(e => {
    const src = nodeSet.get(e.source);
    const tgt = nodeSet.get(e.target);
    if (e.type === 'friend') {
      if (src) src.friendCount++;
      if (tgt) tgt.friendCount++;
    } else {
      if (src) src.familyCount++;
      if (tgt) tgt.familyCount++;
    }
  });

  // Determine dominant connection type for node stroke color
  nodes.forEach(n => {
    if (n.familyCount > 0 && n.friendCount > 0) n.connType = 'both';
    else if (n.familyCount > 0) n.connType = 'family';
    else if (n.friendCount > 0) n.connType = 'friend';
    else n.connType = 'none';
  });

  return { nodes, edges };
}

const { nodes, edges } = parseMatrix(RAW_CSV);

// ── Constants ────────────────────────────────────────────────────────────────
const SGROUP_W = 68; // px spacing between siblings on a bar

// ── Family name assignment ────────────────────────────────────────────────────
const wordFreq = new Map();
nodes.forEach(n => {
  n.name.trim().split(/\s+/).slice(-2).forEach(w => wordFreq.set(w, (wordFreq.get(w)||0)+1));
});
nodes.forEach(n => {
  const parts = n.name.trim().split(/\s+/);
  if (parts.length === 1) { n.family = parts[0]; return; }
  const last = parts[parts.length-1], prev = parts[parts.length-2];
  const lastOk = /^[A-Z]/.test(last) && last.length > 2;
  const prevOk = /^[A-Z]/.test(prev) && prev.length > 2;
  n.family = (prevOk && lastOk)
    ? ((wordFreq.get(prev)||0) >= (wordFreq.get(last)||0) ? prev : last)
    : last;
});

// ── BFS adjacency (string-based, before D3 mutates edges) ────────────────────
const adjNames = new Map();
nodes.forEach(n => adjNames.set(n.name, []));
edges.forEach(e => {
  adjNames.get(e.source)?.push(e.target);
  adjNames.get(e.target)?.push(e.source);
});

function bfsPath(startSet, targetSet) {
  const visited = new Set(startSet);
  const queue = [...startSet].map(n => [n]);
  while (queue.length) {
    const path = queue.shift();
    const curr = path[path.length-1];
    if (targetSet.has(curr)) return path;
    for (const nb of (adjNames.get(curr)||[])) {
      if (!visited.has(nb)) { visited.add(nb); queue.push([...path, nb]); }
    }
  }
  return null;
}

// ── Family bridge MST ────────────────────────────────────────────────────────
const familyMap = new Map();
nodes.forEach(n => { if (!familyMap.has(n.family)) familyMap.set(n.family,[]); familyMap.get(n.family).push(n.name); });
const families = [...familyMap.keys()];

const familyPairs = [];
for (let i = 0; i < families.length; i++)
  for (let j = i+1; j < families.length; j++) {
    const path = bfsPath(new Set(familyMap.get(families[i])), new Set(familyMap.get(families[j])));
    if (path) familyPairs.push({ a: families[i], b: families[j], weight: path.length, path });
  }
familyPairs.sort((a,b) => a.weight - b.weight);
const mstP = new Map(families.map(f=>[f,f]));
function mstFind(x) { if (mstP.get(x)!==x) mstP.set(x,mstFind(mstP.get(x))); return mstP.get(x); }
const mstPaths = [];
for (const fp of familyPairs) {
  const ra = mstFind(fp.a), rb = mstFind(fp.b);
  if (ra !== rb) { mstP.set(ra,rb); mstPaths.push(fp.path); }
}
const bridgePairSet = new Set();
const bridgeSegments = [];
mstPaths.forEach(path => {
  for (let i = 0; i < path.length-1; i++) {
    const key = [path[i],path[i+1]].sort().join('|||');
    if (!bridgePairSet.has(key)) { bridgePairSet.add(key); bridgeSegments.push({ sN: path[i], tN: path[i+1] }); }
  }
});

// ── Sibling group detection (union-find) ─────────────────────────────────────
const SIB_RELS = new Set(['sibling','brother','sister']);
const sibP = new Map(nodes.map(n=>[n.name,n.name]));
function sibFind(x) { if (sibP.get(x)!==x) sibP.set(x,sibFind(sibP.get(x))); return sibP.get(x); }
edges.forEach(e => {
  if (SIB_RELS.has(e.rel?.toLowerCase())) {
    const rA=sibFind(e.source), rB=sibFind(e.target);
    if (rA!==rB) sibP.set(rA,rB);
  }
});

const rawSibGroups = new Map();
nodes.forEach(n => {
  const rep = sibFind(n.name);
  if (!rawSibGroups.has(rep)) rawSibGroups.set(rep,[]);
  rawSibGroups.get(rep).push(n);
});

// Build sim nodes: one anchor per multi-sibling group, person node for singletons
const simNodes = [];
const nodeToSim = new Map();  // person name → sim node (anchor or self)
const nodeByName = new Map(nodes.map(n=>[n.name,n]));
let gid = 0;

rawSibGroups.forEach(members => {
  if (members.length >= 2) {
    const ax = 200 + Math.random()*500, ay = 100 + Math.random()*400;
    const anchor = { name:'__grp_'+(gid++), isGroup:true, members, x:ax, y:ay, vx:0, vy:0 };
    simNodes.push(anchor);
    members.forEach((m,i) => {
      nodeToSim.set(m.name, anchor);
      m.x = ax + (i-(members.length-1)/2)*SGROUP_W;
      m.y = ay;
    });
  } else {
    const n = members[0];
    n.x = n.x || 200+Math.random()*500;
    n.y = n.y || 100+Math.random()*400;
    simNodes.push(n);
    nodeToSim.set(n.name, n);
  }
});

// ── Raw edges for rendering (string names, no sib-sib) ───────────────────────
const rawEdges = edges
  .filter(e => !SIB_RELS.has(e.rel?.toLowerCase()))
  .map(e => ({ type:e.type, rel:e.rel, srcName:e.source, tgtName:e.target }));

// ── Sim links: anchor-level, deduplicated ────────────────────────────────────
const simLinkKeys = new Set();
const simLinks = [];
rawEdges.forEach(e => {
  const ss = nodeToSim.get(e.srcName), st = nodeToSim.get(e.tgtName);
  if (!ss||!st||ss===st) return;
  const key = [ss.name,st.name].sort().join('|||');
  if (!simLinkKeys.has(key)) { simLinkKeys.add(key); simLinks.push({source:ss.name,target:st.name}); }
});

// ── Stats ─────────────────────────────────────────────────────────────────────
const friendEdges = edges.filter(e=>e.type==='friend').length;
const familyEdges = edges.filter(e=>e.type==='family').length;
const sibGroupCount = [...rawSibGroups.values()].filter(m=>m.length>=2).length;
document.getElementById('stats').innerHTML =
  `<span><b>${nodes.length}</b> people</span>
   <span><b>${families.length}</b> families</span>
   <span><b>${sibGroupCount}</b> sibling groups</span>
   <span><b>${friendEdges}</b> friendships</span>`;

// ── D3 Setup ──────────────────────────────────────────────────────────────────
const svgEl = document.getElementById('svg');
const svg   = d3.select(svgEl);
const { width, height } = svgEl.getBoundingClientRect();

const defs = svg.append('defs');
const lg = defs.append('linearGradient').attr('id','bothGrad').attr('x1','0%').attr('y1','0%').attr('x2','100%').attr('y2','100%');
lg.append('stop').attr('offset','0%').attr('stop-color','#58a6ff');
lg.append('stop').attr('offset','100%').attr('stop-color','#d4a843');

const container = svg.append('g').attr('id','container');
const zoomBehavior = d3.zoom().scaleExtent([0.1,4]).on('zoom', e => container.attr('transform',e.transform));
svg.call(zoomBehavior);

// ── Simulation ────────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(simNodes)
  .force('link', d3.forceLink(simLinks).id(d=>d.name).distance(130))
  .force('charge', d3.forceManyBody().strength(-320))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide(d => d.isGroup ? ((d.members.length-1)/2*SGROUP_W+28) : 22))
  .alphaTarget(0);

// ── Render edges (individual positions) ──────────────────────────────────────
const edgeLayer = container.append('g').attr('id','edges');
const edgeSel = edgeLayer.selectAll('line').data(rawEdges).enter().append('line')
  .attr('class', d => d.type==='friend' ? 'edge-friend' : 'edge-family');

// ── Bridge overlay ────────────────────────────────────────────────────────────
const bridgeData = bridgeSegments.map(s=>({
  src: nodeByName.get(s.sN), tgt: nodeByName.get(s.tN)
})).filter(d=>d.src&&d.tgt);
const bridgeGroupEl = container.append('g').attr('id','bridges');
const bridgeSel = bridgeGroupEl.selectAll('line').data(bridgeData).enter().append('line')
  .attr('class','edge-bridge');

// ── Relationship labels ───────────────────────────────────────────────────────
const relLayer = container.append('g').attr('id','rel-labels');
const familyRaw = rawEdges.filter(e=>e.type==='family');
const relSel = relLayer.selectAll('g').data(familyRaw).enter().append('g').attr('class','rel-label');
relSel.append('rect').attr('class','rel-label-bg').attr('rx',3).attr('ry',3);
relSel.append('text').attr('class','rel-label-text').attr('dy','0.35em').text(d=>d.rel);

// ── Sibling group bars ────────────────────────────────────────────────────────
const groupLayer = container.append('g').attr('id','groups');
const groupSel = groupLayer.selectAll('g')
  .data(simNodes.filter(n=>n.isGroup))
  .enter().append('g').attr('class','sibling-group');

groupSel.each(function(anchor) {
  const g = d3.select(this);
  const n = anchor.members.length;
  const halfW = (n-1)/2*SGROUP_W;

  // Horizontal bar
  g.append('line').attr('class','sibling-bar-line')
    .attr('x1',-halfW).attr('y1',0).attr('x2',halfW).attr('y2',0);
  // Centre tick (where parent line arrives)
  g.append('line').attr('class','sibling-tick')
    .attr('x1',0).attr('y1',-7).attr('x2',0).attr('y2',7);

  anchor.members.forEach((m,i) => {
    const ox = (i-(n-1)/2)*SGROUP_W;
    const r  = 7+(m.friendCount+m.familyCount)*0.5;
    const mg = g.append('g').attr('class','node sib-member').attr('data-name',m.name).datum(m);

    mg.append('circle').attr('cx',ox).attr('cy',0).attr('r',r)
      .attr('class','type-person'+(m.connType==='family'?' connected-family':m.connType==='both'?' connected-both':''))
      .style('stroke', m.connType==='both'?'url(#bothGrad)':m.connType==='family'?'#d4a843':m.connType==='friend'?'#3d8bcd':'#444c56');

    mg.append('text').attr('class','node-label')
      .attr('x',ox).attr('y',-(r+4)).attr('text-anchor','middle').text(m.name);

    mg.on('mouseover',(event)=>showTooltip(event,m))
      .on('mousemove',moveTooltip)
      .on('mouseout',hideTooltip);
  });
});

// Drag whole group bar
groupSel.call(d3.drag()
  .on('start',(event,anchor)=>{ if(!event.active) simulation.alphaTarget(0.3).restart(); anchor.fx=anchor.x; anchor.fy=anchor.y; })
  .on('drag', (event,anchor)=>{ anchor.fx=event.x; anchor.fy=event.y; })
  .on('end',  (event,anchor)=>{ if(!event.active) simulation.alphaTarget(0); }))
  .on('dblclick',(event,anchor)=>{ event.stopPropagation(); anchor.fx=null; anchor.fy=null; });

// ── Standalone nodes ──────────────────────────────────────────────────────────
const nodeLayer = container.append('g').attr('id','nodes');
const nodeSel = nodeLayer.selectAll('g')
  .data(simNodes.filter(n=>!n.isGroup))
  .enter().append('g').attr('class','node standalone')
  .attr('data-name',d=>d.name)
  .call(d3.drag()
    .on('start',(event,d)=>{ if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (event,d)=>{ d.fx=event.x; d.fy=event.y; })
    .on('end',  (event,d)=>{ if(!event.active) simulation.alphaTarget(0); }))
  .on('dblclick',(event,d)=>{ event.stopPropagation(); d.fx=null; d.fy=null; })
  .on('mouseover',showTooltip).on('mousemove',moveTooltip).on('mouseout',hideTooltip);

nodeSel.append('circle')
  .attr('r',d=>7+(d.friendCount+d.familyCount)*0.5)
  .attr('class',d=>'type-person'+(d.connType==='family'?' connected-family':d.connType==='both'?' connected-both':''))
  .style('stroke',d=>d.connType==='both'?'url(#bothGrad)':d.connType==='family'?'#d4a843':d.connType==='friend'?'#3d8bcd':'#444c56');

nodeSel.append('text').attr('class','node-label')
  .attr('y',d=>-(7+(d.friendCount+d.familyCount)*0.5)-4)
  .attr('text-anchor','middle').text(d=>d.name);

// ── Tick ──────────────────────────────────────────────────────────────────────
simulation.on('tick', () => {
  // Recompute individual positions from group anchors
  simNodes.forEach(sim => {
    if (sim.isGroup) {
      const n = sim.members.length;
      sim.members.forEach((m,i) => {
        m.x = sim.x + (i-(n-1)/2)*SGROUP_W;
        m.y = sim.y;
      });
    }
  });

  groupSel.attr('transform', d=>`translate(${d.x},${d.y})`);
  nodeSel.attr('transform',  d=>`translate(${d.x},${d.y})`);

  edgeSel
    .attr('x1',d=>nodeByName.get(d.srcName)?.x??0)
    .attr('y1',d=>nodeByName.get(d.srcName)?.y??0)
    .attr('x2',d=>nodeByName.get(d.tgtName)?.x??0)
    .attr('y2',d=>nodeByName.get(d.tgtName)?.y??0);

  relSel.attr('transform',d=>{
    const sx=nodeByName.get(d.srcName)?.x??0, sy=nodeByName.get(d.srcName)?.y??0;
    const tx=nodeByName.get(d.tgtName)?.x??0, ty=nodeByName.get(d.tgtName)?.y??0;
    return `translate(${(sx+tx)/2},${(sy+ty)/2})`;
  });
  relSel.each(function(){
    const g=d3.select(this), text=g.select('text');
    try { const bb=text.node().getBBox(); g.select('rect').attr('x',bb.x-3).attr('y',bb.y-2).attr('width',bb.width+6).attr('height',bb.height+4); } catch(e){}
  });

  bridgeSel
    .attr('x1',d=>d.src.x).attr('y1',d=>d.src.y)
    .attr('x2',d=>d.tgt.x).attr('y2',d=>d.tgt.y);
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let ttTimer = null;

function cancelHide() { clearTimeout(ttTimer); }
function clearHighlight() {
  nodeSel.classed('faded', false);
  d3.selectAll('.sib-member').classed('faded', false);
  edgeSel.classed('faded', false);
  relSel.style('opacity', null);
}
function scheduleHide() {
  ttTimer = setTimeout(()=>{ tooltip.classList.remove('visible'); clearHighlight(); }, 200);
}
tooltip.addEventListener('mouseenter', cancelHide);
tooltip.addEventListener('mouseleave', scheduleHide);

function showTooltip(event, d) {
  cancelHide();
  // edges have string source/target (never passed to forceLink)
  const conns = edges.filter(e=>e.source===d.name||e.target===d.name);
  const fam = conns.filter(e=>e.type==='family');
  const fri = conns.filter(e=>e.type==='friend');

  let html = `<div class="tt-close" onclick="forceHideTooltip()">✕</div>`;
  html += `<div class="tt-name">${d.name}</div>`;
  if (d.family) html += `<div class="tt-row"><span>Family</span><span>${d.family}</span></div>`;
  if (d.friendCount||d.familyCount)
    html += `<div class="tt-row"><span>Friendships</span><span>${d.friendCount}</span></div>
             <div class="tt-row"><span>Family ties</span><span>${d.familyCount}</span></div>`;

  const sim = nodeToSim.get(d.name);
  if (sim?.isGroup && sim.members.length > 1) {
    const sibs = sim.members.filter(m=>m.name!==d.name).map(m=>m.name).join(', ');
    html += `<div class="tt-row" style="flex-wrap:wrap"><span>Siblings</span><span style="font-size:0.6rem;color:var(--text)">${sibs}</span></div>`;
  }

  const allConns = [
    ...fam.map(e=>{ const o=e.source===d.name?e.target:e.source; return `<div class="tt-conn-item"><div class="dot-fam"></div><b>${o}</b><span>${e.rel}</span></div>`; }),
    ...fri.map(e=>{ const o=e.source===d.name?e.target:e.source; return `<div class="tt-conn-item"><div class="dot-f"></div><b>${o}</b></div>`; })
  ];
  if (allConns.length) html += `<div class="tt-connections">${allConns.join('')}</div>`;

  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  positionTooltip(event.clientX, event.clientY);

  const connNames = new Set(conns.map(e=>e.source===d.name?e.target:e.source));
  connNames.add(d.name);
  nodeSel.classed('faded', n=>!connNames.has(n.name));
  d3.selectAll('.sib-member').classed('faded', function(){ return !connNames.has(this.getAttribute('data-name')); });
  edgeSel.classed('faded', e=>!connNames.has(e.srcName)&&!connNames.has(e.tgtName));
  relSel.style('opacity', e=>(connNames.has(e.srcName)||connNames.has(e.tgtName))?1:0);
}

function positionTooltip(cx, cy) {
  const wrap = document.getElementById('graph-wrap').getBoundingClientRect();
  let x=cx-wrap.left+16, y=cy-wrap.top-10;
  if (x+270>wrap.width)  x=cx-wrap.left-280;
  if (y+240>wrap.height) y=cy-wrap.top-240;
  tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
}
function moveTooltip(event) { if(!tooltip.matches(':hover')) positionTooltip(event.clientX,event.clientY); }
function hideTooltip() { scheduleHide(); }
function forceHideTooltip() { clearTimeout(ttTimer); tooltip.classList.remove('visible'); clearHighlight(); }

// ── Toggles ───────────────────────────────────────────────────────────────────
const visible = { friend:true, family:true };
function toggleType(type) {
  visible[type]=!visible[type];
  document.getElementById('tog-'+type).classList.toggle('active',visible[type]);
  edgeSel.filter(d=>d.type===type).style('display',visible[type]?null:'none');
  relSel.filter(d=>d.type===type).style('display',visible[type]?null:'none');
}
let bridgeVisible=true;
function toggleBridge() {
  bridgeVisible=!bridgeVisible;
  document.getElementById('tog-bridge').classList.toggle('active',bridgeVisible);
  bridgeSel.classed('hidden',!bridgeVisible);
}

// ── Search ────────────────────────────────────────────────────────────────────
function toggleSearch() {
  const w=document.getElementById('search-wrap');
  const open=w.style.display==='block';
  w.style.display=open?'none':'block';
  if(!open) document.getElementById('search-input').focus();
  else { doSearch(''); document.getElementById('search-input').value=''; }
}
function doSearch(q) {
  if(!q){clearHighlight();return;}
  const lq=q.toLowerCase();
  const matchNames=new Set(nodes.filter(n=>n.name.toLowerCase().includes(lq)).map(n=>n.name));
  edges.forEach(e=>{
    if(matchNames.has(e.source)) matchNames.add(e.target);
    if(matchNames.has(e.target)) matchNames.add(e.source);
  });
  nodeSel.classed('faded',n=>!matchNames.has(n.name));
  d3.selectAll('.sib-member').classed('faded',function(){return !matchNames.has(this.getAttribute('data-name'));});
  edgeSel.classed('faded',e=>!matchNames.has(e.srcName)&&!matchNames.has(e.tgtName));
  relSel.style('opacity',e=>(matchNames.has(e.srcName)||matchNames.has(e.tgtName))?1:0);
}
document.addEventListener('keydown',e=>{
  if(e.key==='/'){e.preventDefault();toggleSearch();}
  if(e.key==='Escape'){const w=document.getElementById('search-wrap');if(w.style.display==='block')toggleSearch();}
});

// ── Zoom ──────────────────────────────────────────────────────────────────────
function zoom(factor) { svg.transition().duration(300).call(zoomBehavior.scaleBy,factor); }
function resetView()  { svg.transition().duration(500).call(zoomBehavior.transform,d3.zoomIdentity.translate(width/2,height/2).scale(0.9).translate(-width/2,-height/2)); }
</script>
</body>
